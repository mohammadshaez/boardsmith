name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            cd ~/boardsmith

            git pull origin main

            # Backend
            cd api
            npm install
            pm2 restart boardsmith-api

            # Frontend
            cd ../client
            npm install
            npm run build

            sudo rm -rf /var/www/boardsmith/*
            sudo cp -r dist/* /var/www/boardsmith/

            sudo systemctl reload nginx
